<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>블라인드 오목</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

body{
    margin:0;
    background:#111;
    color:white;
    font-family:'Orbitron',sans-serif;
    text-align:center;
}

h1{
    margin-top:20px;
    font-size:50px;
    color:cyan;
    text-shadow:0 0 20px cyan;
}

#board{
    width:750px;
    height:750px;
    margin:20px auto;
    background:#d8a45d;
    border:5px solid #333;

    display:grid;
    grid-template-columns:repeat(15,1fr);
    grid-template-rows:repeat(15,1fr);
}

.cell{
    border:1px solid rgba(0,0,0,0.2);
    position:relative;
    cursor:pointer;
}

.cell:hover{
    background:rgba(255,255,255,0.15);
}

.stone{
    width:80%;
    height:80%;
    border-radius:50%;
    position:absolute;
    top:10%;
    left:10%;
}

.black{
    background:black;
}

.white{
    background:white;
}

#turn{
    font-size:30px;
    margin-top:20px;
}

#log{
    width:500px;
    margin:20px auto;
    height:180px;
    overflow-y:auto;
    background:#222;
    border-radius:10px;
    padding:10px;
    text-align:left;
}
</style>
</head>

<body>

<h1>⚫ 블라인드 오목 ⚪</h1>

<div id="turn">흑 차례</div>

<div id="board"></div>

<div id="log"></div>

<script>

const size = 15;
const board = [];

let turn = 1;
let gameOver = false;

const boardDiv = document.getElementById("board");

for(let y=0;y<size;y++){

    board[y]=[];

    for(let x=0;x<size;x++){

        board[y][x]=0;

        const cell=document.createElement("div");
        cell.className="cell";

        cell.onclick=()=>placeStone(x,y,cell);

        boardDiv.appendChild(cell);
    }
}

function placeStone(x,y,cell){

    if(gameOver) return;

    if(board[y][x]!=0){
        return;
    }

    board[y][x]=turn;

    const stone=document.createElement("div");

    stone.className=
    `stone ${turn==1?"black":"white"}`;

    cell.appendChild(stone);

    // 1초 후 사라짐
    setTimeout(()=>{
        stone.remove();
    },1000);

    addLog(
        `${turn==1?"⚫ 흑":"⚪ 백"} : (${x+1}, ${y+1})`
    );

    if(checkWin(x,y,turn)){

        gameOver=true;

        document.getElementById("turn").innerText=
        `${turn==1?"⚫ 흑":"⚪ 백"} 승리!`;

        showAllStones();

        return;
    }

    turn = turn==1 ? 2 : 1;

    document.getElementById("turn").innerText=
    turn==1 ? "⚫ 흑 차례" : "⚪ 백 차례";
}

function addLog(text){

    const log=document.getElementById("log");

    log.innerHTML += text+"<br>";

    log.scrollTop = log.scrollHeight;
}

function checkWin(x,y,color){

    const dirs=[
        [1,0],
        [0,1],
        [1,1],
        [1,-1]
    ];

    for(let d of dirs){

        let count=1;

        for(let i=1;i<5;i++){

            let nx=x+d[0]*i;
            let ny=y+d[1]*i;

            if(nx<0||ny<0||nx>=15||ny>=15) break;

            if(board[ny][nx]==color) count++;
            else break;
        }

        for(let i=1;i<5;i++){

            let nx=x-d[0]*i;
            let ny=y-d[1]*i;

            if(nx<0||ny<0||nx>=15||ny>=15) break;

            if(board[ny][nx]==color) count++;
            else break;
        }

        if(count>=5) return true;
    }

    return false;
}

function showAllStones(){

    const cells=document.getElementsByClassName("cell");

    for(let y=0;y<size;y++){

        for(let x=0;x<size;x++){

            if(board[y][x]!=0){

                const index=y*15+x;

                const stone=document.createElement("div");

                stone.className=
                `stone ${board[y][x]==1?"black":"white"}`;

                cells[index].appendChild(stone);
            }
        }
    }
}

</script>

</body>
</html>
