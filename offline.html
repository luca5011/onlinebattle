<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>랜덤 미니게임</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

body{
    margin:0;
    background:#111;
    overflow:hidden;
    font-family:'Orbitron',sans-serif;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    height:100vh;
}

h1{
    font-size:60px;
    margin-bottom:40px;
    color:cyan;
    text-shadow:0 0 20px cyan;
}

#selector{

    width:900px;
    height:220px;

    overflow:hidden;

    border:5px solid cyan;
    border-radius:20px;

    position:relative;

    background:#222;
}

#track{

    display:flex;

    position:absolute;

    left:0;
    top:0;
}

.card{

    width:250px;
    height:200px;

    margin:10px;

    border-radius:20px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:30px;
    font-weight:bold;

    flex-shrink:0;

    box-shadow:0 0 20px black;
}

.volley{
    background:linear-gradient(45deg,#ff9966,#ff5e62);
}

.omok{
    background:linear-gradient(45deg,#56ab2f,#a8e063);
}

.cop{
    background:linear-gradient(45deg,#36d1dc,#5b86e5);
}

#pointer{

    position:absolute;

    top:0;
    left:50%;

    transform:translateX(-50%);

    width:8px;
    height:100%;

    background:white;

    box-shadow:0 0 20px white;

    z-index:10;
}

button{

    margin-top:40px;

    padding:20px 40px;

    font-size:28px;

    border:none;
    border-radius:15px;

    cursor:pointer;

    background:cyan;
}

button:hover{

    transform:scale(1.08);
}

</style>
</head>

<body>

<h1>🎲 RANDOM GAME 🎲</h1>

<div id="selector">

    <div id="pointer"></div>

    <div id="track"></div>

</div>

<button onclick="startRoll()">
게임 랜덤 선택
</button>

<script>

const games=[

{
name:"배구",
class:"volley",
url:"pikavolley.html"
},

{
name:"블라인드 오목",
class:"omok",
url:"blindomok.html"
},

{
name:"술래잡기",
class:"cop",
url:"copchase.html"
},
{
name:"달리기",
class:"race",
url:"spamrace.html"
}
];

const track=document.getElementById("track");

for(let i=0;i<20;i++){

    const game=games[i%games.length];

    const card=document.createElement("div");

    card.className=`card ${game.class}`;

    card.innerText=game.name;

    track.appendChild(card);
}

let rolling=false;

function startRoll(){

    if(rolling) return;

    rolling=true;

    let speed=45;

    let pos=0;

    const target=
    Math.floor(Math.random()*games.length);

    let totalDistance=
    5000 + target*270;

    const interval=setInterval(()=>{

        pos-=speed;

        track.style.left=pos+"px";

        speed*=0.985;

        if(Math.abs(pos)>=totalDistance){

            clearInterval(interval);

            const selected=
            games[target];

            setTimeout(()=>{

                location.href=selected.url;

            },1000);
        }

    },16);
}

</script>

</body>
</html>
